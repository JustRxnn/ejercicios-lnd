<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 6</title>
</head>
<body>
    <div class="card">
      <h2>Calculadora de suma simple</h2>
      <div class="row">
        <input type="number" id="num1" placeholder="Num 1"/>
        <span style="color:var(--muted)">+</span>
        <input type="number" id="num2" placeholder="Num 2"/>
        <button id="btn">Sumar</button>
      </div>
      <p id="resultado" class="resultado"></p>
    </div>
     <script>
   const btn = document.getElementById("btn");
    const resultado = document.getElementById("resultado");

    btn.addEventListener("click", function() {
      const a = Number(document.getElementById("num1").value);
      const b = Number(document.getElementById("num2").value);
      let suma = a + b;
      resultado.innerHTML = "La suma es: " + suma;
    });
        
    </script>
</body>
</html>
