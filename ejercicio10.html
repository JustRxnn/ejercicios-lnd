<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 10</title>
</head>
<body>
 <div class="card">
      <h2>Semáforo interactivo</h2>
      <div class="semaforo">
        <div class="luz activo-rojo"  id="luzRoja"></div>
        <div class="luz" id="luzNaranja"></div>
        <div class="luz" id="luzVerde"></div>
      </div>
      <button id="btn">Siguiente</button>
      <p id="resultado" class="resultado">Stop</p>
    </div>

     <script>
const estados = ["rojo", "naranja", "verde"];
    const textos  = ["Stop", "Atención", "Adelante"];
    let estado = 0;
    const btn       = document.getElementById("btn");
    const resultado = document.getElementById("resultado");
    const luzRoja     = document.getElementById("luzRoja");
    const luzNaranja  = document.getElementById("luzNaranja");
    const luzVerde    = document.getElementById("luzVerde");
    btn.addEventListener("click", function() {
      estado = (estado + 1) % 3;
      luzRoja.className    = "luz";
      luzNaranja.className = "luz";
      luzVerde.className   = "luz";
      if (estados[estado] === "rojo")    luzRoja.classList.add("activo-rojo");
      if (estados[estado] === "naranja") luzNaranja.classList.add("activo-naranja");
      if (estados[estado] === "verde")   luzVerde.classList.add("activo-verde");

      resultado.innerHTML = textos[estado];
    })
    </script>
</body>
</html>
